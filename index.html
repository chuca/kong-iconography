<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kong Iconography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ─── Kong Design System — Brand Foundations v1.2 ─────────────────────── */
    :root {
      /* Primary Palette */
      --kong-navy:          #001408;   /* "Navy Green" / Dark theme bg */
      --kong-lime:          #CCFF00;   /* Electric Lime — primary accent */
      --kong-bay:           #CDD4CB;   /* Bay — neutral / secondary text */
      --kong-white:         #FFFFFF;

      /* Grayscale (warm-green tint) */
      --kong-gray-50:       #E7EDE5;
      --kong-gray-100:      #D7DED4;
      --kong-gray-200:      #CDD4CB;
      --kong-gray-300:      #B7BDB5;
      --kong-gray-400:      #A1A69F;
      --kong-gray-500:      #858983;
      --kong-gray-600:      #676B66;
      --kong-gray-700:      #4A4D49;
      --kong-gray-800:      #2D2E2C;
      --kong-gray-900:      #101110;

      /* Typography */
      --font-primary:       "Funnel Sans", system-ui, sans-serif;
      --font-code:          "Roboto Mono", monospace;

      /* Spacing (8px base) */
      --space-1:  8px;
      --space-2:  16px;
      --space-3:  24px;
      --space-4:  32px;
      --space-6:  48px;
      --space-8:  64px;

      /* Border Radius */
      --radius-card:   8px;
      --radius-pill:   999px;
      --radius-code:   4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-primary);
      background-color: var(--kong-navy);
      color: var(--kong-white);
      min-height: 100vh;
      /* Subtle blueprint grid overlay at ~10% opacity */

    }

    /* ─── Layout ──────────────────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--space-4);
    }

    /* ─── Header ──────────────────────────────────────────────────────────── */
    header {
      padding: var(--space-6) 0 40px;
      border-bottom: 1px solid rgba(204, 255, 0, 0.15);
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    /* Logo lockup: Kong wordmark + vertical rule + section label */
    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .kong-wordmark {
      font-family: var(--font-primary);
      font-weight: 800;
      font-size: 22px;
      color: var(--kong-lime);
      letter-spacing: -0.5px;
    }

    .divider-rule {
      width: 1px;
      height: 24px;
      background: var(--kong-gray-600);
    }

    /* Section label: brand spec — uppercase, 11px, 0.1em spacing */
    .section-label {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 11px;
      color: var(--kong-bay);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Tagline */
    .kong-tagline {
      font-family: var(--font-primary);
      font-weight: 300;
      font-size: 13px;
      color: var(--kong-gray-500);
      letter-spacing: 0.02em;
      margin-top: 6px;
    }

    /* Page title: Heading XL — 800 weight */
    .page-title {
      font-family: var(--font-primary);
      font-weight: 800;
      font-size: 48px;
      line-height: 1.05;
      color: var(--kong-lime);
      letter-spacing: -1px;
      margin-top: 20px;
    }

    /* Subtitle: Body L */
    .page-subtitle {
      font-size: 16px;
      color: var(--kong-bay);
      margin-top: 8px;
      font-weight: 300;
    }

    /* ─── Controls bar ────────────────────────────────────────────────────── */
    .controls {
      padding: 28px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 240px;
      max-width: 400px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--kong-gray-500);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(204, 255, 0, 0.18);
      border-radius: 0;
      padding: 10px 14px 10px 40px;
      font-family: var(--font-primary);
      font-size: 14px;
      color: var(--kong-white);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input::placeholder { color: var(--kong-gray-500); }

    .search-input:focus {
      border-color: rgba(204, 255, 0, 0.5);
      /* Glow replaces drop-shadow per brand spec */
      box-shadow: 0 0 0 3px rgba(204, 255, 0, 0.08);
    }

    /* Count badge — code font, section label treatment */
    .count-badge {
      font-family: var(--font-code);
      font-size: 12px;
      color: var(--kong-bay);
      margin-left: auto;
      white-space: nowrap;
    }

    .count-badge span {
      color: var(--kong-lime);
      font-weight: 700;
    }

    /* ─── Card Grid ───────────────────────────────────────────────────────── */

    /* Card container — no radius, no gap, collapsed borders */
    .icon-card {
      position: relative;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 0;
      /* Collapse adjacent borders: pull each card left+up by 1px */
      margin-top: -1px;
      margin-left: -1px;
      padding: 40px 14px 14px;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      cursor: default;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }

    /* Offset the grid to compensate for the margin trick */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      /* Add 1px padding so the first row/col margin doesn't get clipped */
      padding: 1px 0 0 1px;
    }

    .icon-card:hover {
      background: #001408;
      border-color: rgba(204, 255, 0, 0.2);
      box-shadow: 0 0 16px rgba(204, 255, 0, 0.06);
    }

    .icon-card:hover .card-actions {
      opacity: 1;
      pointer-events: all;
    }

    /* Icon wrapper */
    .card-icon-wrap {
      width: 90px;
      height: 90px;
      border-radius: var(--radius-card);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 20px;
    }

    .card-icon-wrap svg {
      width: 48px;
      height: 48px;
    }

    /* Card info */
    .card-info {
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
    }

    /* Card name: 700 weight, 16px */
    .card-name {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 16px;
      color: var(--kong-white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    /* Theme badge — code font, uppercase label style */
    .card-theme {
      display: inline-block;
      margin-top: 5px;
      padding: 2px 7px;
      border-radius: var(--radius-code);
      font-family: var(--font-code);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .theme-mono    { background: rgba(183, 189, 181, 0.12); color: var(--kong-bay); }
    .theme-default { background: rgba(204, 255, 0, 0.10);   color: var(--kong-lime); }

    /* Card actions — pinned to bottom */
    .card-actions {
      width: 100%;
      display: flex;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      margin-top: auto;
    }

    /* Buttons — brand spec: pill shape (999px), Funnel Sans Bold 700 */
    .action-btn {
      font-family: var(--font-primary);
      font-size: 10px;
      font-weight: 700;
      padding: 5px 0;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex: 1;
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* Copy SVG — lime outline pill */
    .copy-btn {
      border: 1px solid rgba(204, 255, 0, 0.3);
      background: transparent;
      color: var(--kong-lime);
    }

    .copy-btn:hover {
      background: rgba(204, 255, 0, 0.12);
      border-color: rgba(204, 255, 0, 0.6);
      box-shadow: 0 0 8px rgba(204, 255, 0, 0.15);
    }

    .copy-btn.copied {
      background: rgba(204, 255, 0, 0.15);
      border-color: var(--kong-lime);
      color: var(--kong-lime);
    }

    /* PNG download — bay/gray outline pill */
    .png-btn {
      border: 1px solid rgba(183, 189, 181, 0.25);
      background: transparent;
      color: var(--kong-bay);
    }

    .png-btn:hover {
      background: rgba(183, 189, 181, 0.08);
      border-color: rgba(183, 189, 181, 0.5);
      color: var(--kong-white);
    }

    .png-btn.downloading {
      opacity: 0.6;
      cursor: default;
    }

    /* ─── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: var(--space-8) 20px;
      text-align: center;
      color: var(--kong-gray-500);
      font-size: 14px;
      display: none;
    }

    /* ─── Footer ──────────────────────────────────────────────────────────── */
    footer {
      padding: var(--space-4) 0 var(--space-6);
      margin-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-meta {
      font-family: var(--font-code);
      font-size: 12px;
      color: var(--kong-gray-600);
    }

    .footer-meta strong { color: var(--kong-gray-400); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div>
        <div class="logo-lockup">
          <span class="kong-wordmark">Kong</span>
          <div class="divider-rule"></div>
          <span class="section-label">Design System</span>
        </div>
        <h1 class="page-title">Iconography</h1>
        <p class="page-subtitle">Complete icon library — Kong brand mono set</p>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5.25" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" type="text" id="searchInput" placeholder="Search icons…" autocomplete="off">
    </div>
    <div class="count-badge">Showing <span id="countDisplay">116</span> of 116 icons</div>
  </div>

  <div id="cardGrid" class="card-grid"></div>
  <div class="empty-state" id="emptyState">No icons match your search.</div>

  <footer>
    <div class="footer-meta">Kong Inc. &middot; Iconography v1 &middot; <strong>116 icons</strong></div>
    <div class="footer-meta">design@konghq.com</div>
  </footer>
</div>

const cardGrid = document.getElementById("cardGrid");
const searchInput = document.getElementById("searchInput");
const countDisplay = document.getElementById("countDisplay");
const emptyState = document.getElementById("emptyState");

function getThemeClass(theme) {
  if (!theme || theme === "default" || theme === "Default") return "theme-default";
  if (theme.startsWith("mono")) return "theme-mono";
  return "theme-default";
}

function getThemeLabel(theme) {
  if (!theme || theme === "default" || theme === "Default") return "default";
  return theme;
}

function downloadPng(icon, btn) {
  if (btn.classList.contains("downloading")) return;
  btn.classList.add("downloading");
  btn.textContent = "…";

  const SIZE = 256;
  // Prepare SVG: set fixed dimensions and transparent background
  const svgStr = icon.svg
    .replace(/width="[^"]*"/, `width="${SIZE}"`)
    .replace(/height="[^"]*"/, `height="${SIZE}"`);

  const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = SIZE;
    canvas.height = SIZE;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.drawImage(img, 0, 0, SIZE, SIZE);
    URL.revokeObjectURL(url);

    canvas.toBlob(pngBlob => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(pngBlob);
      a.download = `${icon.name}.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      btn.classList.remove("downloading");
      btn.textContent = "↓ PNG";
    }, "image/png");
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    btn.classList.remove("downloading");
    btn.textContent = "↓ PNG";
    alert("PNG export failed for: " + icon.name);
  };
  img.src = url;
}

function renderCards(filtered) {
  cardGrid.innerHTML = "";
  if (filtered.length === 0) {
    emptyState.style.display = "block";
    cardGrid.style.display = "none";
  } else {
    emptyState.style.display = "none";
    cardGrid.style.display = "grid";
    filtered.forEach((icon, idx) => {
      const card = document.createElement("div");
      card.className = "icon-card";
      card.innerHTML = `
        <div class="card-icon-wrap">${icon.svg}</div>
        <div class="card-info">
          <span class="card-name" title="${icon.name}">${icon.name}</span>
        </div>
        <div class="card-actions">
          <button class="action-btn copy-btn" data-idx="${idx}">Copy SVG</button>
          <button class="action-btn png-btn" data-idx="${idx}">↓ PNG</button>
        </div>
      `;
      cardGrid.appendChild(card);
    });

    cardGrid.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const icon = filtered[+btn.dataset.idx];
        navigator.clipboard.writeText(icon.svg).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "Copy SVG";
            btn.classList.remove("copied");
          }, 1500);
        });
      });
    });

    cardGrid.querySelectorAll(".png-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const icon = filtered[+btn.dataset.idx];
        downloadPng(icon, btn);
      });
    });
  }
  countDisplay.textContent = filtered.length;
}

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  const base = ICONS.filter(i => !i.name.endsWith('-1'));
  const filtered = q ? base.filter(i => i.name.toLowerCase().includes(q) || (i.theme && i.theme.toLowerCase().includes(q))) : base;
  renderCards(filtered);
});

renderCards(ICONS.filter(i => !i.name.endsWith('-1')));
</script>
</body>
